services:
  app:
    image: php:8.3-apache
    container_name: laravel-app
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    environment:
      - DB_HOST=db
      - DB_DATABASE=laravel
      - DB_USERNAME=root
      - DB_PASSWORD=password
    command: bash -c "composer install --ignore-platform-reqs && cp .env.example .env && php artisan key:generate && chmod -R 777 storage bootstrap/cache && apache2-foreground"

  db:
    image: mariadb:10.11
    container_name: laravel-db
    ports:
      - "3307:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=password
      - MYSQL_DATABASE=laravel
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
